<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система учёта заявок</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar">
        <ul class="navbar-menu">
            <li class="navbar-item">
                <a href="/" class="navbar-link active">Заявки</a>
            </li>
            <li class="navbar-item">
                <a href="/employees-page" class="navbar-link">Сотрудники</a>
            </li>
            <li class="navbar-item">
                <a href="/reports-page" class="navbar-link">Отчёты</a>
            </li>
        </ul>
    </nav>

    <div class="container">
        <h1>Система учёта заявок сотрудников</h1>
        
        <!-- Форма создания заявки -->
        <div class="card">
            <h2>Создать новую заявку</h2>
            <form id="createForm">
                <div class="form-group">
                    <label>Автор:</label>
                    <select id="author_id" required>
                        <option value="">-- Выберите автора --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Исполнитель:</label>
                    <select id="assignee_id" required>
                        <option value="">-- Выберите исполнителя --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Описание:</label>
                    <textarea id="description" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>Срок выполнения:</label>
                    <input type="datetime-local" id="due_date" required>
                </div>
                <button type="submit" class="btn btn-primary">Создать заявку</button>
                <button type="button" onclick="refreshEmployees()" class="btn btn-secondary" style="margin-left: 10px;">Обновить список сотрудников</button>
            </form>
        </div>

        <!-- Фильтры -->
        <div class="card">
            <h2>Фильтры</h2>
            <div class="filters">
                <select id="filter_status">
                    <option value="">Все статусы</option>
                    <option value="Новая">Новая</option>
                    <option value="В работе">В работе</option>
                    <option value="Выполнена">Выполнена</option>
                </select>
                <select id="filter_assignee">
                    <option value="">Все исполнители</option>
                </select>
                <select id="filter_department">
                    <option value="">Все подразделения</option>
                </select>
                <label class="checkbox-label">
                    <input type="checkbox" id="filter_overdue">
                    <span>Только просроченные</span>
                </label>
                <button onclick="loadRequests(true)" class="btn btn-secondary">Применить</button>
            </div>
        </div>

        <!-- Список заявок -->
        <div class="card">
            <h2>Заявки</h2>
            <div class="table-wrapper">
                <table id="requestsTable">
                    <thead>
                        <tr>
                            <th>Номер</th>
                            <th>Автор</th>
                            <th>Исполнитель</th>
                            <th>Описание</th>
                            <th>Срок</th>
                            <th>Статус</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="requestsBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
